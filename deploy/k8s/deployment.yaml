apiVersion: apps/v1
kind: Deployment
metadata:
  name: vra-api
  namespace: veyra
  labels:
    app: vra-api
    version: v4.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vra-api
  template:
    metadata:
      labels:
        app: vra-api
        version: v4.0.0
    spec:
      containers:
      - name: api
        image: veyra/api:v4.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: vra-config
        - secretRef:
            name: vra-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: models
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vra-api
              topologyKey: kubernetes.io/hostname
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vra-frontend
  namespace: veyra
  labels:
    app: vra-frontend
    version: v4.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vra-frontend
  template:
    metadata:
      labels:
        app: vra-frontend
        version: v4.0.0
    spec:
      containers:
      - name: frontend
        image: veyra/frontend:v4.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vra-celery-worker
  namespace: veyra
  labels:
    app: vra-celery-worker
    version: v4.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vra-celery-worker
  template:
    metadata:
      labels:
        app: vra-celery-worker
        version: v4.0.0
    spec:
      containers:
      - name: worker
        image: veyra/api:v4.0.0
        command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: vra-config
        - secretRef:
            name: vra-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
