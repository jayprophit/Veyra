# Cross-Cloud Networking Configuration
apiVersion: v1
kind: Network
metadata:
  name: veyra-network
spec:
  type: multi-cloud
  providers:
    aws:
      vpcId: vpc-12345678
      region: us-east-1
      subnets:
        - subnet-1
        - subnet-2
        - subnet-3
    
    azure:
      vnetId: /subscriptions/12345678-1234-5678-1234-567812345678/resourceGroups/veyra-azure/providers/Microsoft.Network/virtualNetworks/veyra-vnet
      subnets:
        - container-apps-subnet
        - database-subnet
    
    gcp:
      networkId: projects/veyra-gcp/global/networks/veyra-network
      subnets:
        - veyra-private
        - veyra-public
  
  peering:
    aws-azure:
      enabled: true
      type: vpc-peering
      routes:
        - 10.0.0.0/16 -> 10.1.0.0/16
    
    aws-gcp:
      enabled: true
      type: interconnect
      routes:
        - 10.0.0.0/16 -> 10.2.0.0/16
    
    azure-gcp:
      enabled: true
      type: expressroute
      routes:
        - 10.1.0.0/16 -> 10.2.0.0/16
  
  security:
    firewall:
      aws:
        securityGroups:
          - veyra-sg
        networkAcls:
          - veyra-nacl
      
      azure:
        networkSecurityGroups:
          - veyra-nsg
        networkSecurityGroupRules:
          - allow-https
          - allow-ssh
      
      gcp:
        firewallRules:
          - allow-https
          - allow-ssh
          - allow-database