{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veyra.fullname" . }}-api
  labels:
    {{- include "veyra.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    version: {{ .Values.api.image.tag }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "veyra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "veyra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        version: {{ .Values.api.image.tag }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- toYaml .Values.api.env | nindent 12 }}
            - name: CELERY_BROKER_URL
              value: "redis://{{ include "veyra.fullname" . }}-redis-master:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://{{ include "veyra.fullname" . }}-redis-master:6379/2"
          envFrom:
            - configMapRef:
                name: {{ include "veyra.fullname" . }}-config
            - secretRef:
                name: {{ include "veyra.fullname" . }}-secrets
                optional: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- if .Values.api.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.path }}
              port: {{ .Values.api.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.api.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: {{ .Values.api.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          {{- end }}
{{- end }}
