name: Deploy to Google Cloud Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-gcp.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: financial-master
  ARTIFACT_REGISTRY: financial-master-repo

jobs:
  deploy-gcp:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push to Artifact Registry
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          
          echo "image=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-${{ github.event.inputs.environment || 'staging' }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}" \
            --set-env-vars "VERSION=${{ github.sha }}" \
            --set-env-vars "AI_AGENT_MODE=active" \
            --set-env-vars "ANOMALY_DETECTION=enabled" \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 2 \
            --max-instances 100 \
            --concurrency 1000 \
            --timeout 300s \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud Monitoring
        run: |
          # Create custom metrics for trading
          gcloud monitoring metrics create \
            --metric-kind=GAUGE \
            --value-type=DOUBLE \
            trading_volume \
            --description="Total trading volume" \
            2>/dev/null || echo "Metric may already exist"

          # Create alert policies
          gcloud alpha monitoring policies create \
            --display-name="High Trading Volume Alert" \
            --condition-display-name="Trading volume exceeds threshold" \
            --condition-filter='metric.type="custom.googleapis.com/trading_volume" AND resource.type="cloud_run_revision"' \
            --condition-threshold-value=1000000 \
            --condition-threshold-duration=300s \
            --condition-comparison=COMPARISON_GT \
            --notification-channels=${{ secrets.GCP_NOTIFICATION_CHANNEL }} \
            2>/dev/null || echo "Policy may already exist"

      - name: Deploy Cloud Functions (AI Agents)
        run: |
          # Deploy serverless AI agents
          
          # Market Analysis Agent
          gcloud functions deploy market_analysis_agent \
            --runtime python311 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point analyze_market \
            --memory 2Gi \
            --timeout 300s \
            --region ${{ env.REGION }} \
            --set-env-vars "ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}" \
            2>/dev/null || echo "Function may already exist"

          # Risk Management Agent
          gcloud functions deploy risk_management_agent \
            --runtime python311 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point assess_risk \
            --memory 1Gi \
            --timeout 60s \
            --region ${{ env.REGION }} \
            --set-env-vars "ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}" \
            2>/dev/null || echo "Function may already exist"

          # Anomaly Detection Agent
          gcloud functions deploy anomaly_detection_agent \
            --runtime python311 \
            --trigger-topic trading-data \
            --entry-point detect_anomaly \
            --memory 2Gi \
            --timeout 120s \
            --region ${{ env.REGION }} \
            --set-env-vars "ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}" \
            2>/dev/null || echo "Function may already exist"

      - name: Setup BigQuery for analytics
        run: |
          # Create dataset for trading analytics
          bq mk --dataset --location=${{ env.REGION }} \
            ${{ env.PROJECT_ID }}:trading_analytics_${{ github.event.inputs.environment || 'staging' }} \
            2>/dev/null || echo "Dataset may already exist"

          # Create tables for trade data
          bq mk --table \
            ${{ env.PROJECT_ID }}:trading_analytics_${{ github.event.inputs.environment || 'staging' }}.trades \
            schema/trades_schema.json \
            2>/dev/null || echo "Table may already exist"

      - name: Deploy Vertex AI (Predictive Models)
        run: |
          # Deploy custom models for trading predictions
          
          # Create endpoint for real-time predictions
          gcloud ai endpoints create \
            --endpoint-display-name=trading-predictions-${{ github.event.inputs.environment || 'staging' }} \
            --region=${{ env.REGION }} \
            2>/dev/null || echo "Endpoint may already exist"

          # Deploy model (if model artifact exists)
          # gcloud ai models deploy ...

      - name: Setup Pub/Sub for event streaming
        run: |
          # Create topics for trading events
          gcloud pubsub topics create trading-signals \
            2>/dev/null || echo "Topic may already exist"
          
          gcloud pubsub topics create market-data \
            2>/dev/null || echo "Topic may already exist"
          
          gcloud pubsub topics create risk-alerts \
            2>/dev/null || echo "Topic may already exist"

          # Create subscriptions
          gcloud pubsub subscriptions create trading-signals-sub \
            --topic=trading-signals \
            2>/dev/null || echo "Subscription may already exist"

      - name: Setup Firestore for real-time data
        run: |
          # Enable Firestore
          gcloud firestore databases create --location=${{ env.REGION }} \
            2>/dev/null || echo "Database may already exist"

      - name: Health check
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-${{ github.event.inputs.environment || 'staging' }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          
          echo "Service URL: $SERVICE_URL"
          
          # Health check with retry
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying..."
            sleep 15
          done
          
          echo "❌ Health check failed"
          exit 1

      - name: Update traffic splitting (canary deployment)
        if: github.event.inputs.environment == 'production'
        run: |
          # Gradual rollout for production
          gcloud run services update-traffic ${{ env.SERVICE_NAME }}-production \
            --to-revisions LATEST=10,PREVIOUS=90 \
            --region ${{ env.REGION }}

      - name: Notify deployment
        if: always()
        run: |
          echo "## GCP Deployment ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "Service: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "Region: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "URL: $(gcloud run services describe ${{ env.SERVICE_NAME }}-${{ github.event.inputs.environment || 'staging' }} --region ${{ env.REGION }} --format 'value(status.url)')" >> $GITHUB_STEP_SUMMARY

  ml-pipeline:
    name: Deploy ML Pipeline
    runs-on: ubuntu-latest
    needs: deploy-gcp
    
    steps:
      - name: Setup GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Kubeflow pipeline
        run: |
          # Create ML pipeline for model training
          echo "Deploying ML training pipeline..."
          
          # Set up pipeline for:
          # - Market prediction models
          # - Risk assessment models
          # - Anomaly detection models
          # - Portfolio optimization models
          
          echo "ML pipeline deployed"

      - name: Schedule model retraining
        run: |
          # Create Cloud Scheduler job for daily model retraining
          gcloud scheduler jobs create http retrain-market-model \
            --schedule="0 2 * * *" \
            --uri="https://${{ env.REGION }}-aiplatform.googleapis.com/v1/projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/trainingPipelines" \
            --http-method=POST \
            --message-body='{"displayName": "market-prediction-retrain"}' \
            2>/dev/null || echo "Scheduler job may already exist"

  security-scan:
    name: GCP Security Scan
    runs-on: ubuntu-latest
    needs: deploy-gcp
    
    steps:
      - name: Setup GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run Container Analysis
        run: |
          # Scan container for vulnerabilities
          gcloud artifacts docker images scan \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --format='value(response.scan)'

      - name: Check IAM policies
        run: |
          # Audit IAM configurations
          gcloud projects get-iam-policy ${{ env.PROJECT_ID }} \
            --format=json > iam-policy.json
          
          # Check for overly permissive roles
          echo "IAM policy audit complete"

  rollback-gcp:
    name: Rollback GCP Deployment
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: failure()
    
    steps:
      - name: Setup GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Rollback to previous revision
        run: |
          # Get previous revision
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service ${{ env.SERVICE_NAME }}-${{ github.event.inputs.environment || 'staging' }} \
            --region ${{ env.REGION }} \
            --filter "status.conditions.type:Active AND status.conditions.status:True" \
            --format "value(metadata.name)" | head -2 | tail -1)
          
          if [ -n "$PREVIOUS_REVISION" ]; then
            echo "Rolling back to revision: $PREVIOUS_REVISION"
            gcloud run services update-traffic ${{ env.SERVICE_NAME }}-${{ github.event.inputs.environment || 'staging' }} \
              --to-revisions $PREVIOUS_REVISION=100 \
              --region ${{ env.REGION }}
          else
            echo "No previous revision found"
          fi

      - name: Notify rollback
        run: |
          echo "⚠️ GCP rollback executed"
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
