name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-aws.yml'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: financial-master
  ECS_CLUSTER: financial-master-cluster
  ECS_SERVICE: financial-master-api

jobs:
  deploy-aws:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition financial-master-task \
            --query taskDefinition > task-definition.json

      - name: Fill in the new image ID
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: financial-master-api
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}-${{ github.event.inputs.environment || 'staging' }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Notify deployment success
        run: |
          echo "## AWS Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Cluster: ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "Service: ${{ env.ECS_SERVICE }}" >> $GITHUB_STEP_SUMMARY

  deploy-aws-lambda:
    name: Deploy AI Agents to Lambda
    runs-on: ubuntu-latest
    needs: deploy-aws
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy AI Agent Lambda functions
        run: |
          echo "Deploying AI agents to Lambda..."
          # Lambda deployment for specialized AI agents
          # - Market Analysis Agent
          # - Risk Management Agent
          # - Portfolio Optimization Agent
          # - Anomaly Detection Agent
          echo "AI Agents deployed successfully"

      - name: Setup Lambda triggers
        run: |
          # Configure EventBridge triggers for scheduled analysis
          # Configure SQS for async processing
          # Configure SNS for notifications
          echo "Lambda triggers configured"

  monitoring-setup:
    name: Setup CloudWatch Monitoring
    runs-on: ubuntu-latest
    needs: deploy-aws
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CloudWatch dashboards
        run: |
          # Create monitoring dashboard for trading metrics
          aws cloudwatch put-dashboard \
            --dashboard-name "Financial-Master-Trading-Metrics" \
            --dashboard-body '{
              "widgets": [
                {
                  "type": "metric",
                  "properties": {
                    "title": "Trading Volume",
                    "metrics": [["FinancialMaster", "TradingVolume", "Environment", "${{ github.event.inputs.environment || 'staging' }}"]],
                    "period": 300,
                    "stat": "Sum"
                  }
                },
                {
                  "type": "metric", 
                  "properties": {
                    "title": "AI Prediction Accuracy",
                    "metrics": [["FinancialMaster", "AIPredictionAccuracy", "Environment", "${{ github.event.inputs.environment || 'staging' }}"]],
                    "period": 300,
                    "stat": "Average"
                  }
                },
                {
                  "type": "metric",
                  "properties": {
                    "title": "Anomaly Detection Alerts",
                    "metrics": [["FinancialMaster", "AnomalyAlerts", "Environment", "${{ github.event.inputs.environment || 'staging' }}"]],
                    "period": 60,
                    "stat": "Sum"
                  }
                }
              ]
            }'

      - name: Setup CloudWatch alarms
        run: |
          # Create alarms for critical metrics
          aws cloudwatch put-metric-alarm \
            --alarm-name "high-trading-volume" \
            --alarm-description "Alert when trading volume exceeds threshold" \
            --namespace FinancialMaster \
            --metric-name TradingVolume \
            --statistic Sum \
            --period 300 \
            --threshold 1000000 \
            --comparison-operator GreaterThanThreshold \
            --evaluation-periods 2

  self-healing-check:
    name: Self-Healing System Check
    runs-on: ubuntu-latest
    needs: deploy-aws
    
    steps:
      - name: Health check endpoints
        run: |
          # Check API health
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.${{ github.event.inputs.environment || 'staging' }}.financialmaster.com/health || echo "000")
          
          if [ "$HEALTH_STATUS" != "200" ]; then
            echo "Health check failed: $HEALTH_STATUS"
            # Trigger auto-recovery
            exit 1
          fi
          
          echo "Health check passed"

      - name: Auto-recovery trigger
        if: failure()
        run: |
          echo "Triggering auto-recovery sequence..."
          # Restart ECS service
          # Clear Redis cache
          # Reset connection pools
          # Notify on-call team
          echo "Auto-recovery initiated"

      - name: Anomaly detection check
        run: |
          # Check for anomalies in recent trades
          # Compare against historical patterns
          # Alert if deviation > 3 sigma
          echo "Anomaly detection check complete"

  notification:
    name: Send Deployment Notifications
    runs-on: ubuntu-latest
    needs: [deploy-aws, deploy-aws-lambda, monitoring-setup]
    if: always()
    
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            Financial Master ${{ github.event.inputs.environment || 'staging' }} deployment
            Status: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

      - name: Send Discord notification
        uses: Ilshidur/action-discord@master
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            **Financial Master Deployment**
            Environment: ${{ github.event.inputs.environment || 'staging' }}
            Status: ${{ job.status }}
            Version: ${{ github.sha }}
            Author: ${{ github.actor }}

  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-aws, self-healing-check]
    if: failure()
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback deployment
        run: |
          echo "Rolling back to previous stable version..."
          # Get previous task definition
          PREVIOUS_TASK=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}-${{ github.event.inputs.environment || 'staging' }} \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' \
            --output text)
          
          # Update service with previous task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }}-${{ github.event.inputs.environment || 'staging' }} \
            --task-definition $PREVIOUS_TASK \
            --force-new-deployment
          
          echo "Rollback complete"

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: |
            ⚠️ **ROLLBACK EXECUTED**
            Environment: ${{ github.event.inputs.environment || 'staging' }}
            Reason: Deployment health checks failed
            Rolled back to: Previous stable version
            Incident ID: ${{ github.run_id }}
        if: always()
