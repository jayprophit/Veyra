{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "veyra.fullname" . }}-worker
  labels:
    {{- include "veyra.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    version: {{ .Values.worker.image.tag }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "veyra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "veyra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
        version: {{ .Values.worker.image.tag }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: {{ .Values.worker.command | toJson }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "veyra.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: REDIS_URL
              value: "redis://{{ include "veyra.fullname" . }}-redis-master:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://{{ include "veyra.fullname" . }}-redis-master:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://{{ include "veyra.fullname" . }}-redis-master:6379/2"
          envFrom:
            - secretRef:
                name: {{ include "veyra.fullname" . }}-secrets
                optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
---
