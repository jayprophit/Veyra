apiVersion: v2
name: veyra
description: A Helm chart for Veyra - The Open-Source Bloomberg Terminal Alternative
type: application
version: 1.0.0
appVersion: "4.0.0"
keywords:
  - finance
  - trading
  - fintech
  - ai
  - bloomberg-terminal
home: https://github.com/jayprophit/Financial-Master
sources:
  - https://github.com/jayprophit/Financial-Master
maintainers:
  - name: Veyra Team
    email: dev@veyra.app
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
