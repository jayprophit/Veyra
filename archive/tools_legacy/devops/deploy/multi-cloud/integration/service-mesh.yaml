# Multi-Cloud Service Mesh Integration
apiVersion: v1
kind: ServiceMesh
metadata:
  name: veyra-mesh
spec:
  providers:
    aws:
      region: us-east-1
      account: "123456789012"
    azure:
      subscription: "veyra-subscription"
      resourceGroup: "veyra-azure"
    gcp:
      project: "veyra-gcp"
      region: "us-central1"
  
  services:
    - name: veyra-api
      provider: aws
      endpoint: https://veyra-api.us-east-1.elb.amazonaws.com
      backup:
        - provider: azure
          endpoint: https://veyra-api.azurewebsites.net
        - provider: gcp
          endpoint: https://veyra-api-xxxxxx-uc.a.run.app
    
    - name: veyra-ai
      provider: gcp
      endpoint: https://veyra-ai-xxxxxx-uc.a.run.app
      backup:
        - provider: aws
          endpoint: https://veyra-ai.us-east-1.elb.amazonaws.com
    
    - name: veyra-analytics
      provider: azure
      endpoint: https://veyra-analytics.powerbi.com
      backup:
        - provider: gcp
          endpoint: https://veyra-analytics.bigquery.google.com
  
  routing:
    primary: aws
    failover:
      - azure
      - gcp
    loadBalancing: round_robin
  
  monitoring:
    provider: grafana
    dashboards:
      - aws-cloudwatch
      - azure-monitor
      - gcp-monitoring