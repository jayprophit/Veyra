apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: default
data:
  POSTGRES_DB: veyra
  POSTGRES_USER: veyra

---
apiVersion: v1
kind: Secret
metadata:
  name: veyra-db-secret
  namespace: default
type: Opaque
stringData:
  postgres-password: "veyra123"
  postgres-url: "postgresql://veyra:veyra123@veyra-postgres:5432/veyra"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: veyra-postgres
  namespace: default
  labels:
    app: veyra
    component: database
spec:
  serviceName: veyra-postgres
  replicas: 1
  selector:
    matchLabels:
      app: veyra
      component: database
  template:
    metadata:
      labels:
        app: veyra
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        envFrom:
        - configMapRef:
            name: postgres-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: veyra-db-secret
              key: postgres-password
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U veyra -d veyra
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U veyra -d veyra
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: veyra-postgres
  namespace: default
  labels:
    app: veyra
    component: database
spec:
  clusterIP: None
  selector:
    app: veyra
    component: database
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
