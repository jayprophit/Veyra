name: SSS-Grade CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ===== STAGE 1: VALIDATION =====
  validate:
    name: 🔍 Code Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy pylint bandit
      
      - name: Lint Python code
        run: |
          flake8 *.py --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check *.py || true
          isort --check-only *.py || true
      
      - name: Security scan
        run: bandit -r *.py -f json -o bandit-report.json || true
      
      - name: Type checking
        run: mypy *.py --ignore-missing-imports || true

  # ===== STAGE 2: TESTING =====
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        test-type: [unit, integration]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-xdist coverage
      
      - name: Install test dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov pytest-xdist coverage pytest-mock
          pip install aiohttp websockets  # For broker tests
          
      - name: Run ${{ matrix.test-type }} tests with coverage
        run: |
          if [ "${{ matrix.test-type }}" == "unit" ]; then
            pytest tests/unit -v --cov=app --cov-report=xml --cov-report=html -n auto --cov-fail-under=60
          else
            pytest tests/integration -v --cov=app --cov-append
          fi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          CI: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ===== STAGE 3: SECURITY =====
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Financial Master'
          path: '.'
          format: 'ALL'
      
      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ===== STAGE 4: BUILD =====
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Install Node dependencies
        run: |
          cd dashboard
          npm ci
      
      - name: Build Dashboard
        run: |
          cd dashboard
          npm run build
      
      - name: Build Python executables
        run: |
          pyinstaller --onefile --name financial-master main.py
          pyinstaller --onefile --name fm-cli 35_CLI_Tool.py
      
      - name: Build Docker image
        run: docker build -t financial-master:${{ github.sha }} .
      
      - name: Save Docker image
        run: docker save financial-master:${{ github.sha }} > financial-master.tar
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            dashboard/dist/
            financial-master.tar

  # ===== STAGE 5: DEPLOY (Staging) =====
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/financial-master
            docker-compose down
            docker-compose pull
            docker-compose up -d

  # ===== STAGE 6: DEPLOY (Production) =====
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      
      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/financial-master
            docker-compose down
            docker-compose pull
            docker-compose up -d --scale api=3
            
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}

  # ===== STAGE 7: NOTIFICATION =====
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
