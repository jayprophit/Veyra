# Financial Master - Docker Compose
# Production-ready stack with all services

version: '3.8'

services:
  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-master-api
    ports:
      - "8000:8000"    # REST API
      - "8765:8765"    # WebSocket
    environment:
      - DB_TYPE=sqlite
      - SQLITE_PATH=./data/financial_master.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - USE_MOCK_DATA=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MAX_DAILY_TRADES=5
      - APPROVAL_THRESHOLD=10000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      - ollama
    networks:
      - financial-master
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama LLM Server (Free tier)
  ollama:
    image: ollama/ollama:latest
    container_name: financial-master-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - financial-master
    restart: unless-stopped
    # Pre-pull models on first start
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull llama3.2:3b || true
        ollama pull llama3.1:8b || true
        wait
      "

  # Optional: PostgreSQL for scalable tier
  # Uncomment to use PostgreSQL instead of SQLite
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: financial-master-postgres
  #   environment:
  #     POSTGRES_USER: finmaster
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
  #     POSTGRES_DB: financial_master
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - financial-master
  #   restart: unless-stopped

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: financial-master-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - financial-master
  #   restart: unless-stopped

  # Backup service
  backup:
    image: offen/docker-volume-backup:v2
    container_name: financial-master-backup
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"  # Daily at 2am
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_FILENAME: backup-%Y-%m-%dT%H-%M-%S.tar.gz
      BACKUP_ARCHIVE: /archive
      BACKUP_STOP_CONTAINER_LABEL: financial-master.stop-during-backup
    volumes:
      - ./data:/backup/data:ro
      - ./backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - financial-master.stop-during-backup=true
    networks:
      - financial-master
    restart: unless-stopped

volumes:
  ollama-models:
  # postgres-data:

networks:
  financial-master:
    driver: bridge
