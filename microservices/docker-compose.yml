version: '3.8'

services:
  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - consul
      - redis
    networks:
      - financial-master

  # User Service
  user-service:
    build: ./services/user-service
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - consul
      - redis
    networks:
      - financial-master

  # Portfolio Service
  portfolio-service:
    build: ./services/portfolio-service
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Trading Service
  trading-service:
    build: ./services/trading-service
    ports:
      - "8083:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Market Data Service
  market-data-service:
    build: ./services/market-data-service
    ports:
      - "8084:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Analytics Service
  analytics-service:
    build: ./services/analytics-service
    ports:
      - "8085:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=elasticsearch
    depends_on:
      - postgres
      - consul
      - redis
      - elasticsearch
    networks:
      - financial-master

  # AI/ML Service
  ai-ml-service:
    build: ./services/ai-ml-service
    ports:
      - "8086:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Blockchain Service
  blockchain-service:
    build: ./services/blockchain-service
    ports:
      - "8087:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Security Service
  security-service:
    build: ./services/security-service
    ports:
      - "8088:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Notification Service
  notification-service:
    build: ./services/notification-service
    ports:
      - "8089:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/financial_master
      - CONSUL_HOST=consul
      - REDIS_HOST=redis
      - KAFKA_HOST=kafka
    depends_on:
      - postgres
      - consul
      - redis
      - kafka
    networks:
      - financial-master

  # Infrastructure Services
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=financial_master
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - financial-master

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - financial-master

  consul:
    image: consul:1.15
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
    command: agent -server -bootstrap -ui -client=0.0.0.0
    networks:
      - financial-master

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - financial-master

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - financial-master

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - financial-master

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - financial-master

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - financial-master

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - financial-master

volumes:
  postgres_data:
  redis_data:
  consul_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  financial-master:
    driver: bridge
