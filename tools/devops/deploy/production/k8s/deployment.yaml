apiVersion: apps/v1
kind: Deployment
metadata:
  name: veyra-api
  namespace: production
  labels:
    app: vra-api
    version: v6.0.9
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vra-api
  template:
    metadata:
      labels:
        app: vra-api
        version: v6.0.9
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vra-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api
        image: veyra-api:v6.0.9
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: vra-db-credentials
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vra-cache-credentials
              key: url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vra-auth-secrets
              key: jwt-secret
        - name: ALPACA_API_KEY
          valueFrom:
            secretKeyRef:
              name: vra-broker-credentials
              key: alpaca-key
        - name: MSCI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vra-esg-credentials
              key: msci-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      serviceAccountName: vra-api-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veyra-websocket
  namespace: production
  labels:
    app: vra-websocket
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vra-websocket
  template:
    metadata:
      labels:
        app: vra-websocket
    spec:
      containers:
      - name: websocket
        image: veyra-websocket:v6.0.9
        ports:
        - containerPort: 8001
          name: websocket
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: vra-cache-credentials
              key: url
        - name: MAX_CONNECTIONS
          value: "10000"
        - name: CONNECTION_TIMEOUT
          value: "300"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veyra-ml
  namespace: production
  labels:
    app: vra-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vra-ml
  template:
    metadata:
      labels:
        app: vra-ml
    spec:
      containers:
      - name: ml-server
        image: veyra-ml:v6.0.9
        ports:
        - containerPort: 8002
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MODEL_PATH
          value: "/models/production"
        - name: GPU_ENABLED
          value: "true"
        - name: BATCH_SIZE
          value: "64"
        resources:
          requests:
            memory: "8Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "4000m"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ml-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vra-api-service
  namespace: production
spec:
  selector:
    app: vra-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vra-websocket-service
  namespace: production
spec:
  selector:
    app: vra-websocket
  ports:
  - name: websocket
    port: 8001
    targetPort: 8001
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vra-api-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
spec:
  tls:
  - hosts:
    - api.veyra.com
    secretName: vra-api-tls
  rules:
  - host: api.veyra.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vra-api-service
            port:
              number: 80
