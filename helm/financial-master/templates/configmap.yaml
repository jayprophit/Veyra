apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "financial-master.fullname" . }}-config
  labels:
    {{- include "financial-master.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "financial-master.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  REDIS_URL: "redis://{{ include "financial-master.fullname" . }}-redis-master:6379/0"
  CORS_ORIGINS: "*"
