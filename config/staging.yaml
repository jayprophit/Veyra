# Financial Master - Staging Configuration
# =========================================

# Application Settings
app:
  name: "Financial Master"
  version: "1.0.0"
  environment: "staging"
  debug: true
  log_level: "DEBUG"
  
  # Security Settings
  security:
    secret_key: "${STAGING_SECRET_KEY}"
    jwt_secret: "${STAGING_JWT_SECRET}"
    jwt_algorithm: "HS256"
    jwt_expiration_hours: 8
    password_hash_rounds: 10
    cors_origins:
      - "https://staging.financialmaster.com"
      - "https://staging-api.financialmaster.com"
      - "http://localhost:3000"
      - "http://localhost:8000"
    allowed_hosts:
      - "staging.financialmaster.com"
      - "staging-api.financialmaster.com"
      - "localhost"

# Database Configuration
database:
  # Primary Database
  postgres:
    host: "${STAGING_DB_HOST}"
    port: 5432
    database: "financial_master_staging"
    username: "${STAGING_DB_USERNAME}"
    password: "${STAGING_DB_PASSWORD}"
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    pool_recycle: 3600
    echo: false
    
  # Redis Cache
  redis:
    host: "${STAGING_REDIS_HOST}"
    port: 6379
    password: "${STAGING_REDIS_PASSWORD}"
    db: 1
    max_connections: 10
    retry_on_timeout: true
    socket_timeout: 5
    socket_connect_timeout: 5
    
  # Elasticsearch
  elasticsearch:
    hosts:
      - "${STAGING_ES_HOST}:9200"
    username: "${STAGING_ES_USERNAME}"
    password: "${STAGING_ES_PASSWORD}"
    index_prefix: "financial_master_staging"
    timeout: 30

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: true
  access_log: true
  
  # Rate Limiting
  rate_limiting:
    default: "200/minute"
    authenticated: "1000/minute"
    premium: "2000/minute"
    trading: "500/minute"
    
  # API Keys
  api_keys:
    bloomberg: "${STAGING_BLOOMBERG_API_KEY}"
    alpha_vantage: "${STAGING_ALPHA_VANTAGE_API_KEY}"
    polygon: "${STAGING_POLYGON_API_KEY}"
    alpaca: "${STAGING_ALPACA_API_KEY}"
    coinbase: "${STAGING_COINBASE_API_KEY}"
    binance: "${STAGING_BINANCE_API_KEY}"

# Trading Configuration
trading:
  # Order Execution
  execution:
    default_timeout: 30
    max_order_size: 100000
    risk_check_enabled: true
    compliance_check_enabled: true
    
  # Market Data
  market_data:
    providers:
      - name: "polygon"
        enabled: true
        priority: 1
      - name: "alpha_vantage"
        enabled: true
        priority: 2
    
  # Risk Management
  risk:
    max_position_size: 1000000
    max_leverage: 3.0
    var_limit: 5000
    stress_test_enabled: true
    real_time_monitoring: true

# Security Configuration
security:
  # Authentication
  auth:
    mfa_required: false
    session_timeout: 7200
    max_login_attempts: 10
    lockout_duration: 300
    
  # Encryption
  encryption:
    at_rest: true
    in_transit: true
    algorithm: "AES-256-GCM"
    
  # Compliance
  compliance:
    sox_enabled: false
    gdpr_enabled: true
    ccpa_enabled: false
    audit_logging: true
    data_retention_days: 365
    
  # Threat Detection
  threat_detection:
    enabled: false
    ip_whitelist_enabled: false
    geo_blocking_enabled: false
    anomaly_detection: false

# Monitoring & Observability
monitoring:
  # Metrics
  metrics:
    prometheus:
      enabled: true
      port: 9090
      path: "/metrics"
    
  # Logging
  logging:
    level: "DEBUG"
    format: "json"
    outputs:
      - type: "file"
        path: "/var/log/financial_master/staging"
        max_size: "50MB"
        max_files: 5
      - type: "console"
    
  # Tracing
  tracing:
    jaeger:
      enabled: true
      endpoint: "${STAGING_JAEGER_ENDPOINT}"
      service_name: "financial-master-staging"
    
  # Health Checks
  health_checks:
    enabled: true
    endpoint: "/health"
    detailed_endpoint: "/health/detailed"
    
  # Error Tracking
  error_tracking:
    sentry:
      enabled: true
      dsn: "${STAGING_SENTRY_DSN}"
      environment: "staging"

# Message Queue Configuration
message_queue:
  # RabbitMQ
  rabbitmq:
    host: "${STAGING_RABBITMQ_HOST}"
    port: 5672
    username: "${STAGING_RABBITMQ_USERNAME}"
    password: "${STAGING_RABBITMQ_PASSWORD}"
    virtual_host: "/staging"
    connection_timeout: 30
    heartbeat: 600
    
    # Queues
    queues:
      trading_orders:
        durable: true
        max_length: 1000
      market_data:
        durable: true
        max_length: 5000
      notifications:
        durable: true
        max_length: 10000

# External Services
external_services:
  # Payment Processing
  payment:
    stripe:
      enabled: true
      secret_key: "${STAGING_STRIPE_SECRET_KEY}"
      webhook_secret: "${STAGING_STRIPE_WEBHOOK_SECRET}"
    
  # Email
  email:
    smtp:
      host: "${STAGING_SMTP_HOST}"
      port: 587
      username: "${STAGING_SMTP_USERNAME}"
      password: "${STAGING_SMTP_PASSWORD}"
      use_tls: true
    
  # SMS
  sms:
    twilio:
      enabled: false
    
  # File Storage
  storage:
    aws_s3:
      enabled: true
      access_key: "${STAGING_AWS_ACCESS_KEY}"
      secret_key: "${STAGING_AWS_SECRET_KEY}"
      region: "us-east-1"
      bucket: "financial-master-staging"

# Blockchain & Web3
blockchain:
  # Ethereum
  ethereum:
    enabled: false
    network: "goerli"
    rpc_url: "${STAGING_ETH_RPC_URL}"
    
  # Smart Contracts
  contracts:
    deployed_addresses:
      token_contract: "${STAGING_TOKEN_CONTRACT_ADDRESS}"
    
  # DeFi Protocols
  defi:
    uniswap:
      router_address: "${STAGING_UNISWAP_ROUTER_ADDRESS}"
    compound:
      comptroller_address: "${STAGING_COMPOUND_COMPTROLLER_ADDRESS}"

# Mobile App Configuration
mobile:
  # Push Notifications
  push_notifications:
    fcm:
      server_key: "${STAGING_FCM_SERVER_KEY}"
    apns:
      key_id: "${STAGING_APNS_KEY_ID}"
      team_id: "${STAGING_APNS_TEAM_ID}"
      private_key: "${STAGING_APNS_PRIVATE_KEY}"
    
  # API Endpoints
  api_endpoints:
    ios: "https://staging-api.financialmaster.com"
    android: "https://staging-api.financialmaster.com"

# Performance Configuration
performance:
  # Caching
  cache:
    redis:
      ttl: 300
      max_size: 500
    memory:
      max_size: 50
      ttl: 60
    
  # Connection Pooling
  connection_pools:
    database:
      min_size: 2
      max_size: 10
      timeout: 30
    redis:
      min_size: 1
      max_size: 5
      timeout: 5
    
  # Async Processing
  async:
    worker_processes: 4
    max_tasks_per_child: 500
    task_timeout: 300

# Backup & Recovery
backup:
  # Database Backups
  database:
    enabled: true
    schedule: "0 3 * * *"  # Daily at 3 AM
    retention_days: 7
    s3_bucket: "financial-master-staging-backups"
    
  # File Backups
  files:
    enabled: false
    
  # Disaster Recovery
  disaster_recovery:
    enabled: false

# Scaling Configuration
scaling:
  # Auto-scaling
  auto_scaling:
    enabled: false
    min_instances: 1
    max_instances: 5
    
  # Load Balancing
  load_balancer:
    type: "application"
    algorithm: "round_robin"
    health_check:
      path: "/health"
      interval: 30
      timeout: 5
      healthy_threshold: 2
      unhealthy_threshold: 3

# Compliance & Legal
compliance:
  # Regulatory
  regulatory:
    sec_filing: false
    finra_reporting: false
    kyc_required: false
    aml_monitoring: false
    
  # Data Privacy
  privacy:
    data_anonymization: false
    consent_management: true
    right_to_deletion: true
    data_portability: true
    
  # Audit
  audit:
    logging: true
    user_activity_tracking: false
    transaction_monitoring: false
    compliance_reporting: false
