# pytest Configuration for Veyra
# Maximum test coverage and best practices

[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum test coverage
addopts =
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=term-with-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-branch
    --cov-config=.coveragerc
    -v
    --tb=short

# Coverage minimum (start: 50%, goal: 80%)
# This will fail the build if coverage drops below 50%
[coverage:run]
branch = True
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 50
skip_empty = True

[coverage:html]
directory = htmlcov

# Mark custom markers
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests
    slow: marks tests as slow
    performance: marks tests as performance tests
    security: marks tests as security tests
