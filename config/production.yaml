# Veyra - Production Configuration
# ===========================================

# Application Settings
app:
  name: "Veyra"
  version: "1.0.0"
  environment: "production"
  debug: false
  log_level: "INFO"
  
  # Security Settings
  security:
    secret_key: "${SECRET_KEY}"
    jwt_secret: "${JWT_SECRET}"
    jwt_algorithm: "HS256"
    jwt_expiration_hours: 24
    password_hash_rounds: 12
    cors_origins:
      - "https://app.veyra.com"
      - "https://api.veyra.com"
      - "https://admin.veyra.com"
    allowed_hosts:
      - "app.veyra.com"
      - "api.veyra.com"
      - "admin.veyra.com"

# Database Configuration
database:
  # Primary Database
  postgres:
    host: "${DB_HOST}"
    port: 5432
    database: "financial_master_prod"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    pool_size: 20
    max_overflow: 30
    pool_timeout: 30
    pool_recycle: 3600
    echo: false
    
  # Redis Cache
  redis:
    host: "${REDIS_HOST}"
    port: 6379
    password: "${REDIS_PASSWORD}"
    db: 0
    max_connections: 20
    retry_on_timeout: true
    socket_timeout: 5
    socket_connect_timeout: 5
    
  # Elasticsearch
  elasticsearch:
    hosts:
      - "${ES_HOST_1}:9200"
      - "${ES_HOST_2}:9200"
      - "${ES_HOST_3}:9200"
    username: "${ES_USERNAME}"
    password: "${ES_PASSWORD}"
    index_prefix: "veyra"
    timeout: 30

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 8
  reload: false
  access_log: true
  
  # Rate Limiting
  rate_limiting:
    default: "100/minute"
    authenticated: "1000/minute"
    premium: "5000/minute"
    trading: "200/minute"
    
  # API Keys
  api_keys:
    bloomberg: "${BLOOMBERG_API_KEY}"
    alpha_vantage: "${ALPHA_VANTAGE_API_KEY}"
    polygon: "${POLYGON_API_KEY}"
    alpaca: "${ALPACA_API_KEY}"
    coinbase: "${COINBASE_API_KEY}"
    binance: "${BINANCE_API_KEY}"

# Trading Configuration
trading:
  # Order Execution
  execution:
    default_timeout: 30
    max_order_size: 1000000
    risk_check_enabled: true
    compliance_check_enabled: true
    
  # Market Data
  market_data:
    providers:
      - name: "bloomberg"
        enabled: true
        priority: 1
      - name: "polygon"
        enabled: true
        priority: 2
      - name: "alpha_vantage"
        enabled: true
        priority: 3
    
  # Risk Management
  risk:
    max_position_size: 10000000
    max_leverage: 5.0
    var_limit: 50000
    stress_test_enabled: true
    real_time_monitoring: true

# Security Configuration
security:
  # Authentication
  auth:
    mfa_required: true
    session_timeout: 3600
    max_login_attempts: 5
    lockout_duration: 900
    
  # Encryption
  encryption:
    at_rest: true
    in_transit: true
    algorithm: "AES-256-GCM"
    
  # Compliance
  compliance:
    sox_enabled: true
    gdpr_enabled: true
    ccpa_enabled: true
    audit_logging: true
    data_retention_days: 2555
    
  # Threat Detection
  threat_detection:
    enabled: true
    ip_whitelist_enabled: true
    geo_blocking_enabled: true
    anomaly_detection: true

# Monitoring & Observability
monitoring:
  # Metrics
  metrics:
    prometheus:
      enabled: true
      port: 9090
      path: "/metrics"
    
  # Logging
  logging:
    level: "INFO"
    format: "json"
    outputs:
      - type: "file"
        path: "/var/log/veyra"
        max_size: "100MB"
        max_files: 10
      - type: "elasticsearch"
        hosts:
          - "${ES_HOST_1}:9200"
        index: "veyra-logs"
    
  # Tracing
  tracing:
    jaeger:
      enabled: true
      endpoint: "${JAEGER_ENDPOINT}"
      service_name: "veyra"
    
  # Health Checks
  health_checks:
    enabled: true
    endpoint: "/health"
    detailed_endpoint: "/health/detailed"
    
  # Error Tracking
  error_tracking:
    sentry:
      enabled: true
      dsn: "${SENTRY_DSN}"
      environment: "production"

# Message Queue Configuration
message_queue:
  # RabbitMQ
  rabbitmq:
    host: "${RABBITMQ_HOST}"
    port: 5672
    username: "${RABBITMQ_USERNAME}"
    password: "${RABBITMQ_PASSWORD}"
    virtual_host: "/"
    connection_timeout: 30
    heartbeat: 600
    
    # Queues
    queues:
      trading_orders:
        durable: true
        max_length: 10000
      market_data:
        durable: true
        max_length: 50000
      notifications:
        durable: true
        max_length: 100000

# External Services
external_services:
  # Payment Processing
  payment:
    stripe:
      enabled: true
      secret_key: "${STRIPE_SECRET_KEY}"
      webhook_secret: "${STRIPE_WEBHOOK_SECRET}"
    
  # Email
  email:
    smtp:
      host: "${SMTP_HOST}"
      port: 587
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
    
  # SMS
  sms:
    twilio:
      enabled: true
      account_sid: "${TWILIO_ACCOUNT_SID}"
      auth_token: "${TWILIO_AUTH_TOKEN}"
      from_number: "${TWILIO_FROM_NUMBER}"
    
  # File Storage
  storage:
    aws_s3:
      enabled: true
      access_key: "${AWS_ACCESS_KEY}"
      secret_key: "${AWS_SECRET_KEY}"
      region: "us-east-1"
      bucket: "veyra-prod"

# Blockchain & Web3
blockchain:
  # Ethereum
  ethereum:
    enabled: true
    network: "mainnet"
    rpc_url: "${ETH_RPC_URL}"
    private_key: "${ETH_PRIVATE_KEY}"
    
  # Smart Contracts
  contracts:
    deployed_addresses:
      token_contract: "${TOKEN_CONTRACT_ADDRESS}"
      trading_contract: "${TRADING_CONTRACT_ADDRESS}"
    
  # DeFi Protocols
  defi:
    uniswap:
      router_address: "${UNISWAP_ROUTER_ADDRESS}"
      factory_address: "${UNISWAP_FACTORY_ADDRESS}"
    compound:
      comptroller_address: "${COMPOUND_COMPTROLLER_ADDRESS}"

# Mobile App Configuration
mobile:
  # Push Notifications
  push_notifications:
    fcm:
      server_key: "${FCM_SERVER_KEY}"
    apns:
      key_id: "${APNS_KEY_ID}"
      team_id: "${APNS_TEAM_ID}"
      private_key: "${APNS_PRIVATE_KEY}"
    
  # API Endpoints
  api_endpoints:
    ios: "https://api.veyra.com"
    android: "https://api.veyra.com"

# Performance Configuration
performance:
  # Caching
  cache:
    redis:
      ttl: 300
      max_size: 1000
    memory:
      max_size: 100
      ttl: 60
    
  # Connection Pooling
  connection_pools:
    database:
      min_size: 5
      max_size: 20
      timeout: 30
    redis:
      min_size: 2
      max_size: 10
      timeout: 5
    
  # Async Processing
  async:
    worker_processes: 8
    max_tasks_per_child: 1000
    task_timeout: 300

# Backup & Recovery
backup:
  # Database Backups
  database:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM
    retention_days: 30
    s3_bucket: "veyra-backups"
    
  # File Backups
  files:
    enabled: true
    schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
    retention_weeks: 12
    
  # Disaster Recovery
  disaster_recovery:
    enabled: true
    rpo: "1 hour"  # Recovery Point Objective
    rto: "4 hours"  # Recovery Time Objective

# Scaling Configuration
scaling:
  # Auto-scaling
  auto_scaling:
    enabled: true
    min_instances: 2
    max_instances: 20
    target_cpu: 70
    target_memory: 80
    scale_up_cooldown: 300
    scale_down_cooldown: 300
    
  # Load Balancing
  load_balancer:
    type: "application"
    algorithm: "round_robin"
    health_check:
      path: "/health"
      interval: 30
      timeout: 5
      healthy_threshold: 2
      unhealthy_threshold: 3

# Compliance & Legal
compliance:
  # Regulatory
  regulatory:
    sec_filing: true
    finra_reporting: true
    kyc_required: true
    aml_monitoring: true
    
  # Data Privacy
  privacy:
    data_anonymization: true
    consent_management: true
    right_to_deletion: true
    data_portability: true
    
  # Audit
  audit:
    logging: true
    user_activity_tracking: true
    transaction_monitoring: true
    compliance_reporting: true
