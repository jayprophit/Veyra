version: '3.8'

services:
  # ============================================================================
  # Main Application
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: financial-master-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATA_SOURCE=live
      - DATABASE_URL=sqlite:///data/financial_master.db
      - CACHE_ENABLED=true
      - WS_ENABLED=true
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    networks:
      - financial-master-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Dashboard (Frontend)
  # ============================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: financial-master-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    depends_on:
      - api
    networks:
      - financial-master-network

  # ============================================================================
  # Redis (Caching & Sessions)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: financial-master-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - financial-master-network
    command: redis-server --appendonly yes

  # ============================================================================
  # Nginx (Reverse Proxy)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: financial-master-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - financial-master-network

  # ============================================================================
  # Monitoring (Optional)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: financial-master-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - financial-master-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: financial-master-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - financial-master-network
    profiles:
      - monitoring

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  financial-master-network:
    driver: bridge
