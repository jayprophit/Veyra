services:
  - type: web
    name: financial-master
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434